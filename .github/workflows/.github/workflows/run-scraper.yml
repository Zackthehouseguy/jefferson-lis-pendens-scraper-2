name: Run Jefferson Lis Pendens Scraper

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      start_date:
        required: true
        type: string
      end_date:
        required: true
        type: string
      resume:
        required: false
        default: "true"
        type: string
      pva_cross_check:
        required: false
        default: "true"
        type: string
      search_mode:
        required: false
        default: "auto"
        type: string

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          mkdir -p scraper_output
          python jefferson_lis_pendens_scraper.py \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --output-dir scraper_output \
            --pva-cross-check \
            --search-mode "${{ inputs.search_mode }}"

      - name: Upload scraper output artifact
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ inputs.run_id }}
          path: scraper_output/
