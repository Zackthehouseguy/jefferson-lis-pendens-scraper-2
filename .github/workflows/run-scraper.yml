name: Run Property Signal Scraper

on:
  workflow_dispatch:
    inputs:
      run_id:
        required: true
        type: string
      source_type:
        description: "Which source to scrape."
        required: false
        default: "lis_pendens"
        type: choice
        options:
          - lis_pendens
          - wills
          - louisville_code_violations
          - indianapolis_code_violations
      start_date:
        required: true
        type: string
      end_date:
        required: true
        type: string
      resume:
        required: false
        default: "true"
        type: string
      pva_cross_check:
        required: false
        default: "true"
        type: string
      search_mode:
        required: false
        default: "auto"
        type: string
      include_low_signal_code_violations:
        description: "Code-violation sources only: include low-signal/administrative violations. Default false = high-signal distressed leads only."
        required: false
        default: "false"
        type: string
      ingest_url:
        required: true
        type: string
      ingest_token:
        required: true
        type: string

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve source type
        id: source
        run: |
          ST="${{ inputs.source_type }}"
          if [ -z "$ST" ]; then ST="lis_pendens"; fi
          echo "source_type=$ST" >> "$GITHUB_OUTPUT"
          echo "Source type resolved to: $ST"

      - name: Mark run as running
        run: |
          python .github/scripts/update_run.py \
            --run-id "${{ inputs.run_id }}" \
            --ingest-url "${{ inputs.ingest_url }}" \
            --ingest-token "${{ inputs.ingest_token }}" \
            --status running \
            --message "GitHub Actions worker started (source: ${{ steps.source.outputs.source_type }})."

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: |
          mkdir -p scraper_output
          EXTRA_FLAGS=""
          if [ "${{ inputs.pva_cross_check }}" = "true" ]; then EXTRA_FLAGS="$EXTRA_FLAGS --pva-cross-check"; fi
          if [ "${{ inputs.resume }}" = "true" ]; then EXTRA_FLAGS="$EXTRA_FLAGS --resume"; fi
          if [ "${{ inputs.include_low_signal_code_violations }}" = "true" ]; then EXTRA_FLAGS="$EXTRA_FLAGS --include-low-signal-code-violations"; fi
          python -m scrapers.run_source \
            --source-type "${{ steps.source.outputs.source_type }}" \
            --start-date "${{ inputs.start_date }}" \
            --end-date "${{ inputs.end_date }}" \
            --output-dir scraper_output \
            --search-mode "${{ inputs.search_mode }}" \
            $EXTRA_FLAGS

      - name: Upload results to Lovable ingest endpoint
        if: always()
        run: |
          STATUS="completed"
          ERROR_MESSAGE=""
          if [ "${{ steps.scrape.outcome }}" != "success" ]; then
            STATUS="failed"
            ERROR_MESSAGE="Scraper failed in GitHub Actions. Check action_log.txt and workflow logs."
          fi
          python .github/scripts/upload_results.py \
            --run-id "${{ inputs.run_id }}" \
            --ingest-url "${{ inputs.ingest_url }}" \
            --ingest-token "${{ inputs.ingest_token }}" \
            --output-dir scraper_output \
            --source-type "${{ steps.source.outputs.source_type }}" \
            --status "$STATUS" \
            --error-message "$ERROR_MESSAGE" \
            --record-batch-size "${UPLOAD_RECORD_BATCH_SIZE:-100}"
        env:
          UPLOAD_RECORD_BATCH_SIZE: "100"

      - name: Upload scraper output artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ inputs.run_id }}
          path: scraper_output/

      - name: Fail workflow if scraper failed
        if: steps.scrape.outcome != 'success'
        run: exit 1
